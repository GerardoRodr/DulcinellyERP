<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <main class="w-full max-w-sm">
    <div class="bg-white rounded border border-slate-300 overflow-hidden shadow-sm">
      
      <div class="p-6">
        <!-- Logo / Header -->
        <div class="text-center mb-6">
          <h1 class="text-xl font-bold text-slate-800">DulciNelly ERP</h1>
          <p class="text-slate-600 mt-1 text-sm">Ingreso al sistema</p>
        </div>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          
          <!-- Global Error Message -->
          <div *ngIf="errorMessage" class="bg-red-50 text-red-700 p-3 rounded text-sm border border-red-200">
            {{ errorMessage }}
          </div>

          <!-- Username Input -->
          <div>
            <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
            <input 
              type="text" 
              id="username" 
              formControlName="username" 
              class="block w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 sm:text-sm" 
              placeholder="Ej. admin"
              aria-required="true"
              [attr.aria-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched ? 'true' : null">
            <!-- Validation Error -->
            <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="text-red-600 text-xs mt-1">
              El usuario es requerido.
            </div>
          </div>

          <!-- Password Input -->
          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              formControlName="password" 
              class="block w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 sm:text-sm" 
              placeholder="••••••••"
              aria-required="true"
              [attr.aria-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched ? 'true' : null">
            <!-- Validation Error -->
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-600 text-xs mt-1">
              <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida.</span>
              <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres.</span>
            </div>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            [disabled]="isSubmitting"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded text-sm font-medium text-white bg-slate-800 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            <span *ngIf="!isSubmitting">Ingresar</span>
            <span *ngIf="isSubmitting">Verificando...</span>
          </button>
        </form>

      </div>

    </div>
  </main>
</div>
