<div class="max-w-3xl mx-auto">
      
      <!-- Header Area -->
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-800">Registro de Movimientos</h2>
        <p class="text-sm text-slate-500 mt-1">Registra entradas o salidas de inventario</p>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-700 p-4 rounded-lg mb-6 shadow-sm flex items-center">
        <i class="fa-solid fa-circle-check text-lg mr-2"></i>
        {{ successMessage }}
      </div>

      <!-- Form Card -->
      <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
        
        <!-- Tabs -->
        <div class="flex border-b border-slate-200 bg-slate-50">
          <button 
            type="button" 
            (click)="switchTab('entrada')"
            class="flex-1 py-4 text-sm font-medium text-center transition-colors focus:outline-none"
            [ngClass]="activeTab === 'entrada' ? 'bg-white text-slate-800 border-t-2 border-t-slate-800 shadow-[0_1px_0_0_white] z-10' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'">
            Registrar Entrada
          </button>
          <button 
            type="button" 
            (click)="switchTab('salida')"
            class="flex-1 py-4 text-sm font-medium text-center transition-colors focus:outline-none"
            [ngClass]="activeTab === 'salida' ? 'bg-white text-slate-800 border-t-2 border-t-slate-800 shadow-[0_1px_0_0_white] z-10' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'">
            Registrar Salida
          </button>
        </div>

        <!-- Form Body -->
        <div class="p-6">
          <form [formGroup]="movimientoForm" (ngSubmit)="onSubmit()" class="space-y-5">
            
            <!-- Insumo Predictivo -->
            <div class="relative">
              <label class="block text-sm font-medium text-slate-700 mb-1">Producto / Insumo</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                  <i class="fa-solid fa-magnifying-glass text-slate-400 text-lg"></i>
                </div>
                <input 
                  type="text" 
                  [value]="selectedInsumoName"
                  (input)="filterInsumos($event)"
                  (blur)="hideDropdown()"
                  (focus)="showInsumosDropdown = true"
                  class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500 sm:text-sm" 
                  placeholder="Escribe para buscar un insumo...">
              </div>
              
              <!-- Dropdown Predictivo -->
              <div *ngIf="showInsumosDropdown && filteredInsumos.length > 0" class="absolute z-20 mt-1 w-full bg-white border border-slate-200 rounded-md shadow-lg max-h-48 overflow-y-auto">
                <ul class="py-1">
                  <li *ngFor="let insumo of filteredInsumos" 
                      (mousedown)="$event.preventDefault(); selectInsumo(insumo)"
                      class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-sm text-slate-700">
                    <span class="font-medium text-slate-900">{{ insumo.id }}</span> - {{ insumo.name }}
                  </li>
                </ul>
              </div>
              
              <div *ngIf="movimientoForm.get('insumoId')?.invalid && movimientoForm.get('insumoId')?.touched" class="text-red-500 text-xs mt-1">Selecciona un insumo válido.</div>
            </div>

            <!-- Cantidad y Motivo -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Cantidad</label>
                <input type="number" formControlName="cantidad" step="0.1" class="block w-full px-3 py-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500 sm:text-sm">
                <div *ngIf="movimientoForm.get('cantidad')?.invalid && movimientoForm.get('cantidad')?.touched" class="text-red-500 text-xs mt-1">Debe ser mayor a 0.</div>
              </div>
              
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Motivo</label>
                <select formControlName="motivo" class="block w-full px-3 py-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500 sm:text-sm">
                  <option value="" disabled selected>Selecciona un motivo</option>
                  <option *ngIf="activeTab === 'entrada'" value="Compra a proveedor">Compra a proveedor</option>
                  <option *ngIf="activeTab === 'entrada'" value="Devolución">Devolución</option>
                  <option *ngIf="activeTab === 'entrada'" value="Ajuste positivo">Ajuste de inventario (Positivo)</option>
                  <option *ngIf="activeTab === 'salida'" value="Producción">Uso en producción</option>
                  <option *ngIf="activeTab === 'salida'" value="Merma">Merma o desperdicio</option>
                  <option *ngIf="activeTab === 'salida'" value="Ajuste negativo">Ajuste de inventario (Negativo)</option>
                </select>
                <div *ngIf="movimientoForm.get('motivo')?.invalid && movimientoForm.get('motivo')?.touched" class="text-red-500 text-xs mt-1">Obligatorio.</div>
              </div>
            </div>

            <!-- Condicional: Orden de Producción -->
            <div *ngIf="activeTab === 'salida'">
              <label class="block text-sm font-medium text-slate-700 mb-1">Orden de Producción</label>
              <input type="text" formControlName="ordenProduccion" placeholder="Ej. ORD-00123" class="block w-full px-3 py-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500 sm:text-sm">
              <div *ngIf="movimientoForm.get('ordenProduccion')?.invalid && movimientoForm.get('ordenProduccion')?.touched" class="text-red-500 text-xs mt-1">La orden es obligatoria para registrar salidas.</div>
            </div>
            
            <div class="pt-4 border-t border-slate-200 flex justify-end">
              <button type="submit" [disabled]="isSubmitting" class="px-6 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-slate-800 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-800 disabled:opacity-50 disabled:cursor-not-allowed">
                <span *ngIf="!isSubmitting">Guardar {{ activeTab === 'entrada' ? 'Entrada' : 'Salida' }}</span>
                <span *ngIf="isSubmitting">Procesando...</span>
              </button>
            </div>

          </form>
        </div>
      </div>
      
    </div>
